upstream api {
    server api:8000;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API reverse proxy
    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin portal
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # Teacher portal
    location /teacher {
        alias /usr/share/nginx/html/teacher;
        try_files $uri $uri/ /teacher/index.html;
    }

    # Student portal
    location /student {
        alias /usr/share/nginx/html/student;
        try_files $uri $uri/ /student/index.html;
    }

    # Parent portal
    location /parent {
        alias /usr/share/nginx/html/parent;
        try_files $uri $uri/ /parent/index.html;
    }

    # Transport portal
    location /transport {
        alias /usr/share/nginx/html/transport;
        try_files $uri $uri/ /transport/index.html;
    }

    # Finance portal
    location /finance {
        alias /usr/share/nginx/html/finance;
        try_files $uri $uri/ /finance/index.html;
    }

    # Shell (host) — must be last so it catches everything else
    location / {
        root /usr/share/nginx/html/shell;
        try_files $uri $uri/ /index.html;
    }
}
