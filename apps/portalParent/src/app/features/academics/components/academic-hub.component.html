<div class="hub">
  <header class="hub-header">
    <mat-icon class="header-icon">school</mat-icon>
    <div class="header-text">
      <h1 class="header-title">Academic Progress & Exam Reports</h1>
      <p class="header-sub">Track your child's educational journey</p>
    </div>
  </header>

  <div class="hub-content">
    <section class="grid-3">
      <mat-card class="feature-card">
        <mat-card-header>
          <mat-icon mat-card-avatar class="card-icon">description</mat-icon>
          <mat-card-title>Latest Report Card</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="card-body">
            <div class="grade-display">
              <span class="grade">A</span>
              <span class="grade-label">Overall Grade</span>
            </div>
            <p class="card-meta">Term 1, 2026</p>
            <p class="card-desc">View and download the complete academic report with detailed subject grades and teacher comments.</p>
          </div>
        </mat-card-content>
        <mat-card-actions>
          <button mat-flat-button color="primary">
            <mat-icon>download</mat-icon>
            Download PDF
          </button>
        </mat-card-actions>
      </mat-card>

    </section>

    <section class="quick-links">
      <a routerLink="report-cards" class="quick-link">
        <mat-icon>assessment</mat-icon>
        <span>View All Report Cards</span>
      </a>
    </section>

    <router-outlet />
  </div>
</div>
