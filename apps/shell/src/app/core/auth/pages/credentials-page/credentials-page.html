<div class="login-container">
  <mat-card class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="header-wrapper">
        <button 
          mat-icon-button 
          class="back-button" 
          (click)="goBack()"
          aria-label="Back to identifier input"
        >
          <mat-icon>arrow_back</mat-icon>
        </button>
        
        <div class="user-avatar">
          <mat-icon>person</mat-icon>
        </div>
        
        <p class="welcome-text">Welcome back,</p>
        <h1 class="identifier-text">{{ identifier }}</h1>
      </div>
    </div>

    <!-- Form -->
    <div class="login-form">
      <mat-form-field appearance="outline" class="full-width input-field">
        <mat-label>Password</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          [(ngModel)]="password"
          placeholder="Enter your password"
          (keydown.enter)="onKeyPress($event)"
          autocomplete="current-password"
        />
        <mat-icon matPrefix>lock_outline</mat-icon>
        <button
          mat-icon-button
          matSuffix
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="'Hide password'"
          [attr.aria-pressed]="hidePassword"
          type="button"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button
        mat-raised-button
        class="login-button"
        (click)="onSubmit()"
        [disabled]="!password || isLoading"
      >
        <div class="button-content">
          @if (isLoading) {
            <mat-spinner diameter="20" color="accent"></mat-spinner>
          } @else {
            <span>Login</span>
          }
        </div>
      </button>

      <div class="help-text">
        <p>
          <a routerLink="/forgot-password">Forgot password?</a>
        </p>
        <p style="margin-top: 0.5rem;">
          Not {{ identifier }}? 
          <a href="javascript:void(0)" (click)="goBack()">Use a different account</a>
        </p>
      </div>
    </div>
  </mat-card>
</div>
