<div class="login-page">

  <!-- Decorative blue blobs (corners + floating accent) -->
  <div class="blob-corner-bl"></div>
  <div class="blob-corner-br"></div>
  <div class="blob-float"></div>

  <!-- ────────── LEFT SECTION (blue panel) ────────── -->
  <div class="left-section">

    <!-- Bulge blob that makes the panel's right edge swell outward at the top -->
    <div class="blob-bulge"></div>

    <!-- Hero text block -->
    <div class="hero-text">
      <h1 class="headline">Welcome Back!</h1>
      <h2 class="subheadline">Access your School Management Portal</h2>
      <p class="hero-sub">
        Sign in to your account and continue<br>
        your journey with us.
      </p>
      <div class="accent-line"></div>
    </div>

    <!-- Circular school photo -->
    <div class="photo-circle">
      <img
        class="school-img"
        src="/images/school-building.jpg"
        alt="School Building"
        onerror="this.style.display='none'"
      />
    </div>

  </div>

  <!-- ────────── RIGHT SECTION (form) ────────── -->
  <div class="right-section">
    <div class="login-card">

      <h2 class="card-title">Sign In</h2>
      <p class="card-sub">Access your School Management Portal</p>

      <form class="login-form" (submit)="$event.preventDefault()">

        <!-- Email -->
        <div class="input-field">
          <mat-icon class="field-icon">person</mat-icon>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="Email Address"
            name="email"
            autocomplete="email"
            (keydown.enter)="onKeyPress($event)"
          />
        </div>

        <!-- Password -->
        <div class="input-field">
          <mat-icon class="field-icon">lock</mat-icon>
          <input
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            placeholder="Password"
            name="password"
            autocomplete="current-password"
            (keydown.enter)="onKeyPress($event)"
          />
          <button
            type="button"
            class="show-btn"
            (click)="togglePassword()"
          >{{ hidePassword ? 'SHOW' : 'HIDE' }}</button>
        </div>

        <!-- Remember me / Forgot Password -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
            <span class="checkbox-box">
              <mat-icon>check</mat-icon>
            </span>
            Remember me
          </label>
          <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          class="sign-in-btn"
          (click)="onSubmit()"
          [disabled]="!email || !password || isLoading"
        >
          @if (isLoading) {
            <mat-spinner diameter="20" class="btn-spinner"></mat-spinner>
            <span>Signing in...</span>
          } @else {
            <span>Sign In</span>
          }
        </button>

        <!-- OR divider -->
        <div class="or-divider">
          <span class="divider-line"></span>
          <span class="or-text">Or</span>
          <span class="divider-line"></span>
        </div>

        <!-- Alternate sign-in -->
        <button type="button" class="alt-signin-btn" (click)="signInWithOther()">
          Sign in with other
        </button>

      </form>

      <p class="signup-row">
        Don't have an account? <a class="signup-link" (click)="$event.preventDefault()">Sign Up</a>
      </p>

    </div>
  </div>

</div>
