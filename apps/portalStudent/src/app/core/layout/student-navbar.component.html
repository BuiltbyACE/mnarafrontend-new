<header class="navbar">
  <div class="navbar-left">
    <span class="greeting">{{ greeting() }}</span>
  </div>

  <div class="navbar-right">
    <button class="icon-btn" aria-label="Notifications">
      <mat-icon>notifications</mat-icon>
      @if (notifCount().assignments + notifCount().announcements) {
        <span class="badge">{{ notifCount().assignments + notifCount().announcements }}</span>
      }
    </button>

    <button class="icon-btn" aria-label="Messages">
      <mat-icon>chat</mat-icon>
      @if (notifCount().messages) {
        <span class="badge badge-green">{{ notifCount().messages }}</span>
      }
    </button>

    <div class="divider"></div>

    <div class="theme-toggle">
      <mat-icon class="theme-icon">light_mode</mat-icon>
      <mat-slide-toggle
        [checked]="isDarkMode()"
        (change)="toggleDarkMode()"
        aria-label="Toggle dark mode"
      />
      <mat-icon class="theme-icon">dark_mode</mat-icon>
    </div>

    <div class="divider"></div>

    <button class="user-block" [matMenuTriggerFor]="userMenu" aria-label="User menu">
      @if (authStore.avatarUrl(); as avatarUrl) {
        <img [src]="avatarUrl" class="avatar avatar-img" alt="" />
      } @else {
        <div class="avatar">{{ initials() }}</div>
      }
      <div class="user-info">
        <span class="user-name">{{ fullName() }}</span>
        <span class="user-meta">{{ grade() }}</span>
      </div>
      <mat-icon class="chevron">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="student-menu" xPosition="before">
      <div class="menu-header">
        @if (authStore.avatarUrl(); as avatarUrl) {
          <img [src]="avatarUrl" class="menu-avatar-img" alt="" />
        } @else {
          <div class="menu-avatar">{{ initials() }}</div>
        }
        <div class="menu-details">
          <span class="menu-name">{{ fullName() }}</span>
          <span class="menu-id">{{ admissionNo() }}</span>
          <span class="menu-email">{{ email() }}</span>
        </div>
      </div>
      <mat-divider />
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item (click)="changePassword()">
        <mat-icon>lock</mat-icon>
        <span>Change Password</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider />
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</header>
