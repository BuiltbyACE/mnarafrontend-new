name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Lint, unit test, and build all apps
      - run: npx nx run-many -t lint test build

      # ─────────────────────────────────────────────────────────────
      # E2E tests are disabled by default until a test backend exists.
      # To re-enable:
      #   1. Uncomment below
      #   2. Ensure the e2e tests use page.route() to mock the API
      #   3. Run: npx nx run-many -t e2e
      # ─────────────────────────────────────────────────────────────
      # - run: npx nx run-many -t e2e

      - run: npx nx fix-ci
        if: always()
